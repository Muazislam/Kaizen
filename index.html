<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="number" name="" id="num1" /><br />
    <input type="text" name="" id="num2" /><br />
    <button onclick="add()">Add</button><br />
    <!--Addition tag-->
    <button onclick="sub()">Subtract</button><br />
    <!--Subtraction tag-->
    <button onclick="mul()">Multiply</button><br />
    <!--Multiplication tag-->
    <button onclick="div()">Divide</button><br />
    <!--Division tag-->
    <h2 id="result"></h2>

    <script>
      //----------> Addition function .js
      const add = () => {
        let num1 = document.getElementById("num1").value;
        let num2 = document.getElementById("num2").value;
        let result = parseFloat(num1) + parseFloat(num2);

        document.getElementById("result").innerHTML = result;
      };

      //----------> Subtraction function .js
      const sub = () => {
        let num1 = document.getElementById("num1").value;
        let num2 = document.getElementById("num2").value;
        let result = parseFloat(num1) - parseFloat(num2);

        document.getElementById("result").innerHTML = result;
      };

      //----------> Multiplication function .js
      const mul = () => {
        let num1 = document.getElementById("num1").value;
        let num2 = document.getElementById("num2").value;
        let result = parseFloat(num1) * parseFloat(num2);

        document.getElementById("result").innerHTML = result;
      };

      //----------> Division function .js
      const div = () => {
        let num1 = document.getElementById("num1").value;
        let num2 = document.getElementById("num2").value;
        let result = parseFloat(num1) / parseFloat(num2);

        document.getElementById("result").innerHTML = result;
      };
    </script>
  </body>
</html>
