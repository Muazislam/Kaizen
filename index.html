<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up portal</title>
  </head>
  <body>
    <input
      type="firstName"
      name=""
      id="firstName"
      placeholder="First name"
    /><br />
    <input
      type="lastName"
      name=""
      id="lastName"
      placeholder="Last name"
    /><br />
    <input
      type="email"
      name=""
      id="email"
      placeholder="Enter your email"
    /><br />
    <input
      type="password"
      name=""
      id="password"
      placeholder="Enter your password"
    /><br />
    <input
      type="confirmPassword"
      name=""
      id="confirmPassword"
      placeholder="Re-Enter your password"
    /><br />
    <fieldset>
      <legend>Are you male or female</legend>
      <div>
        <input type="radio" name="" id="male" value="male" />
        <label for="male">male</label>
      </div>
      <div>
        <input type="radio" name="" id="female" value="female" />
        <label for="female">female</label>
      </div>
      <div>
        <input
          type="radio"
          name=""
          id="doNotPrefer"
          value="Do not want to share"
        />
        <label for="doNotPrefer">Do not want to share</label>
      </div>

      <div>
        <button type="submit">Submit</button>
      </div>
    </fieldset>
  </body>
</html>
