<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="text" name="" id="name" placeholder="Name" /><br />
    <input type="email" name="" id="email" placeholder="email" /><br />
    <input
      type="password"
      name=""
      id="password"
      placeholder="Enter your password"
    /><br />
    <input
      type="password"
      name=""
      id="confirmPassword"
      placeholder="Re-Enter password"
    /><br />
    <button onclick="validateform()">Register</button>

    <script>
      const validateform = () => {
        let name = document.getElementById(`name`).value;
        let email = document.getElementById(`email`).value;
        let password = document.getElementById(`password`).value;
        let confirmPassword = document.getElementById(`confirmPassword`).value;

        if (name.trim() === "") {
          alert(`Please enter your name`);
        } else if (email.trim() == "") {
          alert(`Please enter yout email`);
        } else if (!email.includes(`@`)) {
          alert(`Please write a valid email address`);
        } else if (password.trim() == "") {
          alert(`Password with empty spaces is not allowed`);
        } else if (password.length < 8 || password.length > 12) {
          alert(
            `Password must be more than 8 character and less than 12 characters`,
          );
        } else if (password != confirmPassword) {
          alert(`Password does not match`);
        } else {
          alert(`Form submitted successfully`);
        }
      };
    </script>
  </body>
</html>
