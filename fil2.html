<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .heading h2 {
        text-shadow: 28px -10px 8px rgba(206,89,55,0.46);
    }

    .box2 {
        --r: 25px; /* radius of circles */
  height: 320px;
  aspect-ratio: 1;
  padding: calc(1.5*var(--r));
  background: #e97f02;
  mask: 
    linear-gradient(#000 0 0) no-repeat
     50%/calc(100% - 2*var(--r)) calc(100% - 2*var(--r)), 
    radial-gradient(farthest-side,#000 97%,#0000) 
     0 0/calc(2*var(--r)) calc(2*var(--r)) round;
        
        }

    .box1 {
        width:200px;
        height: 200px;
        background-color: brown;

        -webkit-box-shadow: 37px 33px 14px 9px rgba(0,0,0,0.83); 
box-shadow: 37px 33px 14px 9px rgba(0,0,0,0.83);
    }
</style>
<body>
    <div class="box1">

    </div>

    <div class="box2"></div>

    <div class="heading">
        <h2>heading 2</h2>
    </div>
</body>
</html>
